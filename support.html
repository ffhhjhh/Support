<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة الإبداع التقني</title>
    <link rel="icon" type="image/x-icon" href="images/iconTap.jpg">
</head>
<body>

    <nav>
        <a href="#">الرئيسية</a> |
        <a href="">من نحن</a> |
        <a href="#media">معرض الأعمال</a> |
        <a href="#contact">تواصل معنا</a>
    </nav>
    <hr>

    <br><br>

    <section>
        <h1>مرحباً بكم في شركة الإبداع التقني</h1>
        <p>نحن شركة متخصصة في تطوير الويب، للإطلاع على أعمالنا <a href="https://www.google.com" target="_blank">زورا موقعنا على جوجل</a> </p>
    </section>  

    <br><br>

    <section id="media">
        <h2>جولة مرئية داخل شركتنا</h2>
        <img src="images/img1.jpg" alt="مكتب الشركة الرئيسي" width="400">
        <br><br>
        <video src="02.mp4" controls width="400"></video>            
    </section>

    <br><br>

    <hr>
    <section id="contact">
        <h2>تواصل معنا </h2>
        <form>
            <label>الاسم الكامل:</label>
            <input type="text" placeholder="اكتب اسمك هنا"><br><br>
            <label>البريد الإلكتروني:</label>
            <input type="email" placeholder="name@example.com"><br><br>
            <!-- here is a inputs phone -->
             <label>رقم الهاتف:</label>
            <input type="tel" name="phone" placeholder="رقم الهاتف" ><br>

            <!-- this is a input for message -->
            <label>الشكوى:</label>
            <textarea name="message" rows="5" cols="40" placeholder="اكتب شكاويك هنا"></textarea><br><br>
            <!-- this is a url contact with support whatsapps -->
            <a href="https://wa.me/1234567890" target="_blank">تواصل معنا على واتساب</a><br><br>
            <!-- this is another url contact with support whatsapps -->
            <a href="https://www.whatsapp.com/contact/noclient?lang=ar_AR" target="_blank">2 تواصل معنا على واتساب</a><br><br>
            <!-- this is a iframe viduo with youtube -->
            <div style="width:560px; height:315px;">
                <iframe
                    width="100%"
                    height="100%"
                    src="https://www.youtube.com/embed/6QAELgirvjs"
                    title="YouTube video player"
                    frameborder="0"
                    allow="autoplay; encrypted-media; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <input type="submit" value="إرسال البيانات">
            
        </form>

        <h2>موقعنا الجغرافي</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d19042.01507570428!2d34.45431354047226!3d31.51410727042486!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sar!2s!4v1780324877296!5m2!1sar!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </section>

    <a href="#">العودة لأعلى الصفحة ↑</a>
    
</body>
</html>
